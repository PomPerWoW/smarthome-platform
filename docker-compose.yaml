services:
  db:
    image: postgis/postgis:17-3.6-alpine
    platform: linux/amd64
    container_name: smarthome_db
    env_file:
      - .env
    ports:
      - "${DB_EXTERNAL_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - smarthome-network-dev

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: smarthome-backend-dev
    volumes:
      - backend-data:/app/data
    networks:
      - smarthome-network-dev
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
        VITE_SCENE_CREATOR_URL: ${VITE_SCENE_CREATOR_URL}
        VITE_HOST_IP: ${VITE_HOST_IP}
    container_name: smarthome-frontend
    env_file:
      - .env
    networks:
      - smarthome-network-dev
    depends_on:
      - backend

  scene-creator:
    build:
      context: .
      dockerfile: apps/scene-creator/Dockerfile
    container_name: smarthome-scene-creator
    env_file:
      - .env
    networks:
      - smarthome-network-dev
    depends_on:
      - backend

  https-proxy:
    image: nginx:alpine
    container_name: smarthome-https-proxy
    ports:
      - "${FRONTEND_PORT}:3000"
      - "${SCENE_CREATOR_PORT}:3003"
      - "${BACKEND_PORT}:5500"
    volumes:
      - ./docker/proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - proxy_certs:/etc/nginx/certs
    command: >
      sh -c "
      apk add --no-cache openssl &&
      if [ ! -f /etc/nginx/certs/cert.pem ]; then
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/nginx/certs/key.pem -out /etc/nginx/certs/cert.pem -subj '/CN=localhost';
      fi &&
      nginx -g 'daemon off;'
      "
    networks:
      - smarthome-network-dev
    depends_on:
      - frontend
      - scene-creator
      - backend

volumes:
  backend-data:
    name: smarthome-backend-data
  db_data:
    name: smarthome-db-data
  proxy_certs:
    name: smarthome-proxy-certs

networks:
  smarthome-network-dev:
    driver: bridge
    name: smarthome-network-dev
