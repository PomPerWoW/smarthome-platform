# ============================================================================
# SmartHome Platform — production Docker Compose
# ============================================================================
# Usage:
#   docker compose -f docker-compose.production.yaml --env-file .env.production up -d --build
#
# Services listen on HTTP inside the stack; publish ${FRONTEND_PORT}, ${SCENE_CREATOR_PORT},
# ${BACKEND_PORT} to the host. Terminate TLS and route paths on your host reverse proxy
# (e.g. nginx/Caddy) — no in-compose HTTPS proxy here.
# ============================================================================

services:
  db:
    image: postgis/postgis:17-3.6-alpine
    platform: linux/amd64
    container_name: smarthome_postgres
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_EXTERNAL_PORT}:5432"
    networks:
      - smarthome_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: smarthome_backend
    env_file:
      - .env.production
    environment:
      DATABASE_HOST: smarthome_postgres
      DATABASE_PORT: 5432
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    expose:
      - "5500"
    networks:
      - smarthome_network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf -o /dev/null http://127.0.0.1:5500/smarthome/admin/login/ || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 50s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
        VITE_SCENE_CREATOR_URL: ${VITE_SCENE_CREATOR_URL}
        VITE_HOST_IP: ${VITE_HOST_IP}
    container_name: smarthome_frontend
    env_file:
      - .env.production
    expose:
      - "3000"
    networks:
      - smarthome_network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  scene-creator:
    build:
      context: .
      dockerfile: apps/scene-creator/Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
        VITE_FRONTEND_URL: ${VITE_FRONTEND_URL}
        VITE_DASHBOARD_URL: ${VITE_DASHBOARD_URL}
        VITE_HOST_IP: ${VITE_HOST_IP}
    container_name: smarthome_scene_creator
    env_file:
      - .env.production
    expose:
      - "3003"
    networks:
      - smarthome_network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  https-proxy:
    image: nginx:alpine
    container_name: smarthome_https_proxy
    ports:
      - "${FRONTEND_PORT}:3000"
      - "${SCENE_CREATOR_PORT}:3003"
      - "${BACKEND_PORT}:5500"
    volumes:
      - ./docker/proxy/nginx.production.conf:/etc/nginx/nginx.conf:ro
      - proxy_certs:/etc/nginx/certs
    command: >
      sh -c "
      apk add --no-cache openssl &&
      if [ ! -f /etc/nginx/certs/cert.pem ]; then
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/nginx/certs/key.pem -out /etc/nginx/certs/cert.pem -subj '/CN=turing.se.kmitl.ac.th';
      fi &&
      nginx -g 'daemon off;'
      "
    networks:
      - smarthome_network
    depends_on:
      - frontend
      - scene-creator
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  backend_static:
    driver: local
  backend_media:
    driver: local
  proxy_certs:
    driver: local

networks:
  smarthome_network:
    driver: bridge
    name: smarthome_network_production
