# ============================================================================
# SmartHome Platform Production Docker Compose Configuration
# ============================================================================
# Usage: docker-compose -f docker-compose.production.yaml --env-file .env.production up -d
# ============================================================================
# 
# Port Mappings:
# - Frontend: 3000 (served at /smarthome/home via reverse proxy)
# - Scene Creator: 3003 (served at /smarthome/xr via reverse proxy)
# - Backend: 5500 (served at /smarthome/api via reverse proxy)
# - Database: 5433
# ============================================================================

version: "3.8"

services:
  db:
    image: postgis/postgis:17-3.5-alpine
    container_name: smarthome_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-smarthome}
    networks:
      - smarthome_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-smarthome}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: smarthome_backend
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-smarthome}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "5500:5500"
    networks:
      - smarthome_network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:5500/admin/ | grep -q '[0-9]'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: smarthome_frontend
    ports:
      - "3000:80"
    networks:
      - smarthome_network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  scene-creator:
    build:
      context: ./apps/scene-creator
      dockerfile: Dockerfile
    container_name: smarthome_scene_creator
    ports:
      - "3003:80"
    networks:
      - smarthome_network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  backend_static:
    driver: local
  backend_media:
    driver: local

networks:
  smarthome_network:
    driver: bridge
