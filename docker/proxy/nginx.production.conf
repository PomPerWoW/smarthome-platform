events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Backend (API + WebSocket) ──────────────────────────────────────
    server {
        listen 5500 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Redirect plain HTTP to HTTPS on the same port
        error_page 497 https://$host:5500$request_uri;

        client_max_body_size 50m;

        location / {
            proxy_pass http://backend:5500;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Longer timeouts for WebSocket connections
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }
    }

    # ── Frontend ───────────────────────────────────────────────────────
    server {
        listen 3000 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Redirect plain HTTP to HTTPS on the same port
        error_page 497 https://$host:3000$request_uri;

        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # ── Scene Creator (WebXR app) ──────────────────────────────────────
    server {
        listen 3003 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Redirect plain HTTP to HTTPS on the same port
        error_page 497 https://$host:3003$request_uri;

        # ── Headers required for WebXR ─────────────────────────────────
        add_header Permissions-Policy "xr-spatial-tracking=(*), camera=(*), microphone=(*), gyroscope=(*), accelerometer=(*)" always;

        location / {
            proxy_pass http://scene-creator:3003;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Longer timeouts for persistent XR connections
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }
    }
}
